<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        body{
            font-family:Arial,sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f4f4f4;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:12px;
            width:350px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#4f46e5;
            color:white;
            border:none;
            border-radius:6px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Reset Password</h2>

    <form method="POST" action="/reset-password">
        <input type="email" name="email" placeholder="Enter Email" required>

        <input type="password" name="new_password" placeholder="New Password" required>

        <button type="submit">
            Reset Password
        </button>
    </form>
</div>

</body>
</html>
